<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskApp</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── AUTH SCREEN ── -->
  <div id="auth-screen" class="screen active">
    <div class="auth-bg">
      <div class="grid-lines"></div>
    </div>

    <div class="auth-card">
      <div class="brand">
        <span class="brand-icon">✦</span>
        <h1 class="brand-name">TASKAPP</h1>
      </div>
      <p class="brand-sub">Structured. Simple. Yours.</p>

      <!-- Tabs -->
      <div class="tab-row">
        <button class="tab active" data-tab="login">Sign In</button>
        <button class="tab" data-tab="register">Register</button>
      </div>

      <!-- Login Form -->
      <div id="login-form" class="form-panel active">
        <div class="field">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="your_username" autocomplete="username"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <button class="btn-primary" id="login-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader hidden">⟳</span>
        </button>
        <p class="form-msg" id="login-msg"></p>
      </div>

      <!-- Register Form -->
      <div id="register-form" class="form-panel">
        <div class="field">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="choose_a_username" autocomplete="username"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password"/>
        </div>
        <button class="btn-primary" id="register-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader hidden">⟳</span>
        </button>
        <p class="form-msg" id="register-msg"></p>
      </div>
    </div>
  </div>

  <!-- ── DASHBOARD SCREEN ── -->
  <div id="dashboard-screen" class="screen">

    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">✦</span>
        <span>TASKAPP</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" href="#" data-view="active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          My Tasks
        </a>
        <a class="nav-item" href="#" data-view="completed">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Completed
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip" id="user-chip">
          <span class="user-avatar" id="user-avatar">?</span>
          <span id="sidebar-username">User</span>
        </div>
        <button class="logout-btn" id="logout-btn" title="Sign Out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="top-bar">
        <div>
          <h2 class="page-title" id="page-title">My Tasks</h2>
          <p class="page-sub" id="task-count">Loading…</p>
        </div>
        <button class="btn-add" id="open-add-modal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Task
        </button>
      </header>

      <div class="task-list" id="task-list">
        <div class="empty-state" id="empty-state">
          <span class="empty-icon">◎</span>
          <p>No tasks yet. Add your first one!</p>
        </div>
      </div>
    </main>
  </div>

  <!-- ── ADD TASK MODAL ── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3>New Task</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="field">
        <label>Task Description</label>
        <textarea id="task-input" placeholder="What needs to be done?" rows="3"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="add-task-btn">
          <span class="btn-text">Add Task</span>
          <span class="btn-loader hidden">⟳</span>
        </button>
      </div>
      <p class="form-msg" id="task-msg"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
